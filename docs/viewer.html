<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>autoResearchLib Document Viewer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --panel: #fffdf8;
        --panel-soft: #f7f1e7;
        --text: #1f1a17;
        --muted: #6a5c52;
        --line: #d7c7b8;
        --accent: #8c3b2a;
        --accent-strong: #6b2518;
        --shadow: 0 18px 40px rgba(61, 39, 24, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(140, 59, 42, 0.14), transparent 30%),
          linear-gradient(180deg, #f8f3ec 0%, var(--bg) 100%);
        color: var(--text);
        font: 16px/1.7 Georgia, "Times New Roman", serif;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(140, 59, 42, 0.14);
        background: rgba(255, 253, 248, 0.84);
        backdrop-filter: blur(10px);
      }

      .topbar__inner {
        width: min(1140px, calc(100% - 32px));
        margin: 0 auto;
        padding: 16px 0 18px;
      }

      .topbar__links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .topbar__link {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 253, 248, 0.9);
        color: var(--text);
        font: 600 0.9rem/1.2 Arial, Helvetica, sans-serif;
        text-decoration: none;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          transform 140ms ease;
      }

      .topbar__link:hover {
        border-color: rgba(140, 59, 42, 0.42);
        background: #fff7ee;
        transform: translateY(-1px);
      }

      .topbar__eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font: 700 0.78rem/1.2 Arial, Helvetica, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .topbar h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3.5vw, 2.9rem);
        line-height: 1.02;
      }

      .topbar__meta {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .layout {
        width: min(1140px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
        display: grid;
        grid-template-columns: minmax(240px, 290px) minmax(0, 1fr);
        gap: 22px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .sidebar {
        position: sticky;
        top: 164px;
        align-self: start;
        padding: 18px;
      }

      .sidebar h2 {
        margin: 0 0 10px;
        font: 700 1rem/1.2 Arial, Helvetica, sans-serif;
        letter-spacing: 0.03em;
      }

      .sidebar__hint {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .toc {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .toc:empty::after {
        content: "No headings available.";
        color: var(--muted);
        font-size: 0.92rem;
      }

      .toc__item {
        display: block;
        padding: 7px 10px;
        border-radius: 12px;
        color: var(--text);
        text-decoration: none;
        font-size: 0.94rem;
        line-height: 1.35;
        transition: background 140ms ease, color 140ms ease;
      }

      .toc__item:hover {
        background: var(--panel-soft);
        color: var(--accent-strong);
      }

      .toc__item--lvl1 {
        padding-left: 10px;
        font-weight: 600;
      }

      .toc__item--lvl2 {
        padding-left: 22px;
      }

      .toc__item--lvl3,
      .toc__item--lvl4,
      .toc__item--lvl5,
      .toc__item--lvl6 {
        padding-left: 34px;
        color: var(--muted);
      }

      .sidebar__links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .sidebar__links a {
        color: var(--accent);
        font: 600 0.88rem/1.2 Arial, Helvetica, sans-serif;
        text-decoration: none;
      }

      .sidebar__links a:hover {
        text-decoration: underline;
      }

      .doc {
        min-width: 0;
        padding: 28px 30px 34px;
      }

      .doc img {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .doc p,
      .doc ul,
      .doc ol,
      .doc table,
      .doc pre,
      .doc blockquote {
        margin: 0 0 18px;
      }

      .doc h1,
      .doc h2,
      .doc h3,
      .doc h4,
      .doc h5,
      .doc h6 {
        line-height: 1.18;
        margin: 28px 0 12px;
      }

      .doc h1 {
        margin-top: 0;
        font-size: clamp(1.9rem, 3vw, 2.7rem);
      }

      .doc h2 {
        padding-top: 18px;
        border-top: 1px solid var(--line);
        font-size: 1.55rem;
      }

      .doc h3 {
        font-size: 1.18rem;
      }

      .doc a {
        color: var(--accent);
        text-decoration: none;
      }

      .doc a:hover {
        text-decoration: underline;
      }

      .doc code {
        padding: 1px 5px;
        border-radius: 5px;
        background: #efe4d6;
        font-family: "Courier New", Courier, monospace;
        font-size: 0.92em;
      }

      .doc pre {
        overflow-x: auto;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #f6efe5;
      }

      .doc pre code {
        padding: 0;
        border-radius: 0;
        background: none;
        font-size: 0.9rem;
      }

      .doc ul,
      .doc ol {
        padding-left: 22px;
      }

      .doc li + li {
        margin-top: 5px;
      }

      .doc table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.96rem;
      }

      .doc th,
      .doc td {
        padding: 10px 12px;
        border: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .doc th {
        background: #f3eadf;
        font-weight: 700;
      }

      .doc tr:nth-child(even) {
        background: #fcfaf6;
      }

      .doc blockquote {
        padding: 8px 0 8px 16px;
        border-left: 3px solid rgba(140, 59, 42, 0.35);
        color: var(--muted);
      }

      .empty {
        color: var(--muted);
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          top: auto;
        }
      }

      @media (max-width: 640px) {
        .topbar__inner,
        .layout {
          width: min(100%, calc(100% - 20px));
        }

        .topbar__inner {
          padding-top: 12px;
          padding-bottom: 14px;
        }

        .layout {
          padding-top: 14px;
          padding-bottom: 24px;
          gap: 14px;
        }

        .sidebar,
        .doc {
          padding: 18px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="topbar__links">
          <a class="topbar__link" id="home-link" href="./index.html">Docs Home</a>
          <a class="topbar__link" id="article-link" href="./article/index.html">Article</a>
          <a class="topbar__link" id="raw-link" href="#" hidden>Raw Markdown</a>
        </div>
        <p class="topbar__eyebrow">Embedded Markdown Reader</p>
        <h1 id="doc-title">Document Viewer</h1>
        <p class="topbar__meta" id="doc-meta">Open a document with <code>?doc=specs/DS000-vision.md</code>.</p>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar">
        <h2>Contents</h2>
        <p class="sidebar__hint">Section links are generated from the current Markdown document.</p>
        <nav class="toc" id="toc-list"></nav>
        <div class="sidebar__links" id="doc-links"></div>
      </aside>

      <article class="panel doc" id="content">
        <p class="empty">Select a Markdown document through the <code>doc</code> query parameter.</p>
      </article>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const docParam = params.get("doc");
      const currentUrl = new URL(window.location.href);
      const docsRootUrl = new URL("./", currentUrl);
      const viewerUrl = new URL("viewer.html", docsRootUrl);
      const docsHomeUrl = new URL("index.html", docsRootUrl);
      const articleUrl = new URL("article/index.html", docsRootUrl);

      const contentEl = document.getElementById("content");
      const tocListEl = document.getElementById("toc-list");
      const titleEl = document.getElementById("doc-title");
      const metaEl = document.getElementById("doc-meta");
      const linksEl = document.getElementById("doc-links");
      const rawLinkEl = document.getElementById("raw-link");

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function slugify(text) {
        return text
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, "")
          .trim()
          .replace(/\s+/g, "-");
      }

      function isLocalMarkdownUrl(url) {
        return url.origin === window.location.origin &&
          url.pathname.startsWith(docsRootUrl.pathname) &&
          url.pathname.endsWith(".md");
      }

      function toDocsRelativePath(url) {
        if (!url.pathname.startsWith(docsRootUrl.pathname)) {
          return null;
        }

        return url.pathname.slice(docsRootUrl.pathname.length);
      }

      function toViewerHref(url) {
        const relativePath = toDocsRelativePath(url);

        if (!relativePath) {
          return url.href;
        }

        return `${viewerUrl.pathname}?doc=${encodeURIComponent(relativePath)}`;
      }

      function resolveResourceUrl(url, baseUrl) {
        if (/^(https?:|data:|mailto:|#)/.test(url)) {
          return url;
        }

        try {
          return new URL(url, baseUrl).href;
        } catch {
          return url;
        }
      }

      function resolveLinkUrl(url, baseUrl) {
        const resolved = resolveResourceUrl(url, baseUrl);

        try {
          const parsed = new URL(resolved);

          if (isLocalMarkdownUrl(parsed)) {
            return toViewerHref(parsed);
          }

          return parsed.href;
        } catch {
          return resolved;
        }
      }

      function prettyDocName(path) {
        const filename = path.split("/").pop() || path;
        return filename.replace(/\.md$/i, "");
      }

      function parseTableRow(row) {
        let trimmed = row.trim();
        if (trimmed.startsWith("|")) trimmed = trimmed.slice(1);
        if (trimmed.endsWith("|")) trimmed = trimmed.slice(0, -1);
        return trimmed.split("|");
      }

      function isTableSeparator(line) {
        return /^\|?(\s*:?-+:?\s*\|)+\s*:?-+:?\s*\|?$/.test(line.trim());
      }

      function isTableRow(line) {
        const trimmed = line.trim();
        return trimmed.startsWith("|") && trimmed.endsWith("|") && trimmed.includes("|");
      }

      function inline(text, baseUrl) {
        let value = escapeHtml(text);

        value = value.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, url) => {
          const resolved = resolveResourceUrl(url, baseUrl);
          return `<img src="${resolved}" alt="${escapeHtml(alt)}" />`;
        });

        value = value.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, label, url) => {
          const resolved = resolveLinkUrl(url, baseUrl);
          return `<a href="${resolved}">${label}</a>`;
        });

        value = value.replace(/`([^`]+)`/g, "<code>$1</code>");
        value = value.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        value = value.replace(/\*([^*]+)\*/g, "<em>$1</em>");

        return value;
      }

      function renderMarkdown(markdown, baseUrl) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        const headings = [];
        let html = "";
        let inCode = false;
        let codeLang = "";
        let codeBuffer = [];
        let paragraphBuffer = [];
        let unorderedList = [];
        let orderedList = [];
        let tableBuffer = [];
        let inTable = false;

        function flushParagraph() {
          if (!paragraphBuffer.length) return;
          html += `<p>${inline(paragraphBuffer.join(" "), baseUrl)}</p>`;
          paragraphBuffer = [];
        }

        function flushUnorderedList() {
          if (!unorderedList.length) return;
          html += `<ul>${unorderedList.map((item) => `<li>${inline(item, baseUrl)}</li>`).join("")}</ul>`;
          unorderedList = [];
        }

        function flushOrderedList() {
          if (!orderedList.length) return;
          html += `<ol>${orderedList.map((item) => `<li>${inline(item, baseUrl)}</li>`).join("")}</ol>`;
          orderedList = [];
        }

        function flushCode() {
          if (!codeBuffer.length) return;
          const code = escapeHtml(codeBuffer.join("\n"));
          const langClass = codeLang ? ` class="language-${escapeHtml(codeLang)}"` : "";
          html += `<pre><code${langClass}>${code}</code></pre>`;
          codeBuffer = [];
          codeLang = "";
        }

        function flushTable() {
          if (tableBuffer.length < 2) {
            tableBuffer = [];
            inTable = false;
            return;
          }

          const headerCells = parseTableRow(tableBuffer[0]);
          const dataRows = tableBuffer.slice(2);
          let tableHtml = "<table><thead><tr>";

          for (const cell of headerCells) {
            tableHtml += `<th>${inline(cell.trim(), baseUrl)}</th>`;
          }

          tableHtml += "</tr></thead><tbody>";

          for (const row of dataRows) {
            const cells = parseTableRow(row);
            tableHtml += "<tr>";

            for (let index = 0; index < headerCells.length; index += 1) {
              const cell = cells[index] !== undefined ? cells[index].trim() : "";
              tableHtml += `<td>${inline(cell, baseUrl)}</td>`;
            }

            tableHtml += "</tr>";
          }

          tableHtml += "</tbody></table>";
          html += tableHtml;
          tableBuffer = [];
          inTable = false;
        }

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          const trimmed = line.trim();

          if (trimmed.startsWith("```")) {
            if (!inCode) {
              flushParagraph();
              flushUnorderedList();
              flushOrderedList();
              flushTable();
              inCode = true;
              codeLang = trimmed.replace("```", "").trim();
            } else {
              inCode = false;
              flushCode();
            }
            continue;
          }

          if (inCode) {
            codeBuffer.push(line);
            continue;
          }

          if (isTableRow(trimmed)) {
            if (!inTable) {
              const nextLine = lines[index + 1];
              if (nextLine && isTableSeparator(nextLine)) {
                flushParagraph();
                flushUnorderedList();
                flushOrderedList();
                inTable = true;
                tableBuffer.push(trimmed);
                continue;
              }
            }

            if (inTable) {
              tableBuffer.push(trimmed);
              continue;
            }
          }

          if (inTable && isTableSeparator(trimmed)) {
            tableBuffer.push(trimmed);
            continue;
          }

          if (inTable && !isTableRow(trimmed) && !isTableSeparator(trimmed)) {
            flushTable();
          }

          if (/^#{1,6}\s/.test(trimmed)) {
            flushParagraph();
            flushUnorderedList();
            flushOrderedList();
            flushTable();

            const level = trimmed.match(/^#+/)[0].length;
            const text = trimmed.replace(/^#{1,6}\s+/, "").trim();
            const id = slugify(text);
            headings.push({ level, text, id });
            html += `<h${level} id="${id}">${inline(text, baseUrl)}</h${level}>`;
            continue;
          }

          if (/^[-*]\s+/.test(trimmed)) {
            flushParagraph();
            flushOrderedList();
            flushTable();
            unorderedList.push(trimmed.replace(/^[-*]\s+/, ""));
            continue;
          }

          if (/^\d+\.\s+/.test(trimmed)) {
            flushParagraph();
            flushUnorderedList();
            flushTable();
            orderedList.push(trimmed.replace(/^\d+\.\s+/, ""));
            continue;
          }

          if (trimmed === "") {
            flushParagraph();
            flushUnorderedList();
            flushOrderedList();
            flushTable();
            continue;
          }

          paragraphBuffer.push(trimmed);
        }

        flushParagraph();
        flushUnorderedList();
        flushOrderedList();
        flushCode();
        flushTable();

        return { html, headings };
      }

      function renderToc(headings) {
        if (!headings.length) {
          tocListEl.innerHTML = "";
          return;
        }

        tocListEl.innerHTML = headings.map((heading) => {
          const level = Math.min(heading.level, 6);
          return `<a class="toc__item toc__item--lvl${level}" href="#${heading.id}">${escapeHtml(heading.text)}</a>`;
        }).join("");
      }

      function renderDocLinks(docUrl) {
        const rawHref = docUrl.href;
        const currentDoc = toDocsRelativePath(docUrl);
        const links = [
          `<a href="${docsHomeUrl.pathname}">Docs Home</a>`,
          `<a href="${articleUrl.pathname}">Article</a>`
        ];

        if (currentDoc && currentDoc.startsWith("specs/")) {
          links.push(`<a href="${viewerUrl.pathname}?doc=${encodeURIComponent(currentDoc)}">Reload</a>`);
        }

        links.push(`<a href="${rawHref}">Raw Markdown</a>`);
        linksEl.innerHTML = links.join("");
      }

      function setError(message) {
        titleEl.textContent = "Document Viewer";
        metaEl.textContent = message;
        tocListEl.innerHTML = "";
        linksEl.innerHTML = "";
        contentEl.innerHTML = `<p class="empty">${escapeHtml(message)}</p>`;
        rawLinkEl.hidden = true;
      }

      async function loadDocument() {
        if (!docParam) {
          setError("No document specified.");
          return;
        }

        if (/^(https?:|data:|mailto:)/i.test(docParam)) {
          setError("Only local Markdown documents inside docs/ are allowed.");
          return;
        }

        let docUrl;

        try {
          docUrl = new URL(docParam, docsRootUrl);
        } catch {
          setError("Invalid document path.");
          return;
        }

        if (!isLocalMarkdownUrl(docUrl)) {
          setError("Document must be a local .md file inside docs/.");
          return;
        }

        try {
          const response = await fetch(docUrl.href);

          if (!response.ok) {
            throw new Error(`Unable to load ${docParam}`);
          }

          const markdown = await response.text();
          const { html, headings } = renderMarkdown(markdown, docUrl.href);
          const titleFromContent = headings.find((heading) => heading.level === 1)?.text ?? prettyDocName(docParam);

          document.title = `${titleFromContent} | autoResearchLib`;
          titleEl.textContent = titleFromContent;
          metaEl.textContent = docParam;
          contentEl.innerHTML = html || `<p class="empty">This document is empty.</p>`;
          renderToc(headings);
          renderDocLinks(docUrl);

          rawLinkEl.href = docUrl.href;
          rawLinkEl.hidden = false;
        } catch (error) {
          setError(`Unable to load document: ${error.message}`);
        }
      }

      loadDocument();
    </script>
  </body>
</html>
